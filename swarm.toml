[project]
name = "agent-swarm"
repo = "."
state_dir = ".local/state"
base_branch = "main"
max_agents = 4
min_ram_mb = 1024
prompt_dir = "swarm/prompts"
tracker = "swarm/tracker.json"

auto_approve = false
[backend]
type = "codex-tmux"
model = "gpt-5.3-codex"
bypass_sandbox = true

[notifications]
type = "stdout"

[watchdog]
interval = "1m"
max_runtime = "60m"
stale_timeout = "10m"
max_retries = 2

[integration]
verify_cmd = "go build ./..."
audit_ticket = "sw-09"

[status_report]
enabled = true
interval = "1m"
only_when_running = true
send_on_completion = true

[post_build]
order = ["doc"]
parallel_groups = []
require_integrated_base = true
integrated_base_branch = "dev"
